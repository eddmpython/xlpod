openapi: 3.1.0

info:
  title: xlpod
  version: 0.0.0
  summary: Loopback HTTPS API for the xlpod launcher.
  description: |
    Single source of truth for the xlpod loopback HTTPS API. Both the Rust
    launcher (`launcher/`) and the pure-python client (`client/xlpod`, future)
    are derived from and validated against this file. Neither side imports the
    other; this spec is the only contact surface.

    See `proto/README.md` for the change procedure and `docs/SECURITY.md` for
    the threat model that pins every constraint declared here.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  contact:
    name: xlpod maintainers
    url: https://github.com/eddmpython/xlpod

  # ---- xlpod-specific extensions (machine-readable; the launcher reads these
  # at compile time and refuses to build if any constraint is relaxed). ----
  x-xlpod-proto: 1
  x-xlpod-bind:
    - "127.0.0.1"
    - "::1"
  x-xlpod-tls-only: true
  x-xlpod-allowed-origins:
    - "https://addin.xlwings.org"
  x-xlpod-rate-limit:
    per_token_rps: 100
  x-xlpod-audit: true
  x-xlpod-notes: |
    - 0.0.0.0 binding is forbidden at compile time. Loopback only.
    - Plain HTTP is forbidden. xlwings Lite enforces upgrade-insecure-requests
      and block-all-mixed-content (Phase 0 measurement, 2026-04-07), so a
      plain-text fallback would be unreachable from the only legitimate
      caller and is therefore deleted to shrink attack surface.
    - The Origin header MUST exactly match an entry in
      x-xlpod-allowed-origins. The launcher does not honour wildcards.
    - The Host header MUST be `127.0.0.1:7421` or `[::1]:7421`. This blocks
      DNS rebinding.

servers:
  - url: https://127.0.0.1:7421
    description: |
      Loopback only. The launcher binds 127.0.0.1 and ::1 at compile time.
      Port 7421 is the default; 7422-7430 are reserved fallbacks if 7421 is
      already taken on the user's machine.

security:
  - bearerAuth: []

tags:
  - name: meta
    description: Liveness and version probes.
  - name: auth
    description: Token issuance and scope grant.
  - name: fs
    description: Filesystem reads under token-bound approved roots.
  - name: run
    description: Execute Python in the launcher's worker process.
  - name: excel
    description: Drive a running Excel instance via COM (Windows only).
  - name: ai
    description: |
      AI provider relay. The launcher proxies chat requests to a remote
      provider (Anthropic in Phase 8; OpenAI / Ollama in later phases),
      with API keys stored in the OS keychain and never echoed. Tool
      calls the model emits are dispatched back through the launcher's
      own routes, so the existing 5-check security stack runs on every
      AI-driven action with no shortcut.
  - name: ws
    description: Bidirectional event channel.

paths:

  /health:
    get:
      operationId: getHealth
      tags: [meta]
      summary: Liveness probe (the only unauthenticated route).
      description: |
        Returns 200 with launcher version and proto version. No authentication
        required, no scopes required, no Origin check. This is the *only*
        exception in the entire API and exists so the user can verify the
        launcher is alive without holding a token.
      security: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      responses:
        "200":
          description: Launcher is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}

  /auth/handshake:
    post:
      operationId: postAuthHandshake
      tags: [auth]
      summary: Issue a fresh bearer token with a narrow scope set.
      description: |
        Validates the Origin header against `x-xlpod-allowed-origins`,
        canonicalizes any requested `fs_roots`, then **prompts the user
        for consent via the launcher's tray dialog** before issuing a
        token. If the user denies (or the consent backend rejects), the
        call returns 403 with code `consent_denied` and no token is
        ever created. On approval the launcher mints a new 256-bit
        random bearer token bound to the granted scopes and roots.

        The user's decision is the final word: a launcher with the
        default `MessageBoxConsent` backend cannot be bypassed from the
        wire. Test and dev binaries can replace the backend with
        `AutoApproveConsent`; the production tray launcher does not
        expose that escape.

        Tokens are NEVER persisted to disk and NEVER logged (the audit log
        records only the token id, not the secret). A new token is issued at
        every launcher start; restarting the launcher invalidates all
        outstanding tokens.
      security: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandshakeRequest"
      responses:
        "200":
          description: Token issued (possibly with a narrowed scope set).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Handshake"
        "403":
          description: Origin not in allow-list, or user denied consent.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}

  /fs/read:
    get:
      operationId: getFsRead
      tags: [fs]
      summary: Read a file under one of the token's approved fs roots.
      description: |
        Reads a single file from disk and returns its content
        base64-encoded. The path is resolved against the launcher's
        current working directory if relative, then canonicalized
        (symlinks followed). The canonical path MUST start with one of
        the `fs_roots` the token was issued with — paths outside the
        approved set are rejected with `forbidden_path`, never read.

        Size is capped at 10 MiB; oversized files are rejected with
        `path_too_large` *before* the read is performed. Directories,
        devices, and missing files are rejected with `not_a_file` /
        `path_not_found`. The handler does not follow into directories
        and does not list — listing is a separate route added with
        `/fs/list` in a later phase.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
        - name: path
          in: query
          required: true
          description: Absolute or relative path. Symlinks are followed; the resolved path must lie under an approved root.
          schema:
            type: string
      responses:
        "200":
          description: File contents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileContent"
        "400":
          description: Malformed path or oversized file.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403":
          description: Token lacks `fs:read`, or path is outside the approved roots.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "404":
          description: Path does not exist or is not a file.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}

  /run/python:
    post:
      operationId: postRunPython
      tags: [run]
      summary: Execute a Python snippet inside the launcher's worker.
      description: |
        Sends `code` to a long-running Python worker process owned by
        the launcher and returns its captured stdout/stderr plus an
        optional `result` (the value of the `_result` global if the
        snippet sets one). The worker is shared across all callers
        within a single launcher run; calls are serialized so two
        snippets never execute concurrently against the same globals
        namespace.

        **Execution errors are NOT HTTP errors.** A snippet that
        raises (`1/0`, ImportError, etc.) returns 200 with `ok=false`
        and a Python traceback in `error`. The HTTP layer only fails
        when the worker itself misbehaves: `worker_spawn_failed` if
        the launcher cannot find a Python interpreter,
        `worker_timeout` if the snippet exceeds the wall-clock cap
        (default 30 s; the worker is killed and the next call gets a
        fresh process), or `worker_crashed` if the worker dies
        mid-call.

        Phase 5 ships a single shared worker. Per-workbook isolation,
        idle shutdown, and the 800 MiB memory ceiling described in
        `docs/design.md` §3.6 land in Phase 5.x.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
        - $ref: "#/components/parameters/XXLPodPlanOnly"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunPythonRequest"
      responses:
        "200":
          description: Worker executed (possibly with `ok=false` for a Python-level error).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunPythonResponse"
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403":
          description: Token lacks `run:python`.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "500":
          description: Worker spawn failed or worker crashed.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "504":
          description: Worker exceeded the wall-clock cap; the worker has been killed.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}

  /excel/workbooks:
    get:
      operationId: getExcelWorkbooks
      tags: [excel]
      summary: List workbooks open in the running Excel instance.
      description: |
        Attaches to the user's already-running Excel via COM
        (`GetActiveObject("Excel.Application")`) and returns the
        currently open workbooks. Does **not** start a new Excel
        instance — Phase 6 is read-only against whatever Excel the
        user already opened.

        Requires `excel:com` scope. Returns 503 with
        `excel_not_available` if `pywin32` is missing from the
        worker's Python (e.g. on a Linux CI runner), or
        `excel_not_running` if Excel is not currently open.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      responses:
        "200":
          description: List of open workbooks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkbookList"
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403":
          description: Token lacks `excel:com`.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "503":
          description: Excel COM unavailable on the worker.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}

  /excel/range/read:
    post:
      operationId: postExcelRangeRead
      tags: [excel]
      summary: Read a range from a workbook in the running Excel instance.
      description: |
        Reads `range` from `sheet` in `workbook` (all three are
        Excel-side names; the workbook must already be open). The
        result is a 2-D array of cell values; single cells come back
        as `[[value]]` so the response shape is uniform. Empty cells
        return `null`. The canonical Excel address Excel resolved to
        is returned in `address` for round-trip clarity.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RangeReadRequest"
      responses:
        "200":
          description: Range values.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RangeData"
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403":
          description: Token lacks `excel:com`.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "503":
          description: Excel COM unavailable on the worker.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}

  /ai/chat:
    post:
      operationId: postAiChat
      tags: [ai]
      summary: Non-streaming chat completion against an AI provider.
      description: |
        Relays a chat completion request to the configured AI provider
        (Phase 8 ships Anthropic only). The launcher loads the API key
        from the OS keychain — the key never appears in the request,
        the response, or any audit line. The model receives the
        launcher's tool registry (see `GET /ai/tools`); when it emits
        a `tool_use` block the launcher dispatches the call back
        through its own routes, traversing the full 5-check stack
        with an internal bearer minted at `POST /ai/session` time.

        Mutating tool calls trigger the consent dialog *per call* in
        Phase 8. Trust windows that skip the dialog for N minutes are
        added in Phase 9. Streaming (`/ai/chat/stream`) is also
        Phase 9.

        Requires `ai:provider:call`. Mutating tools additionally
        require their own scope (`fs:write`, `ai:exec:python`, etc.)
        on the *user's* token at session-open time; the launcher
        bakes the intersection into the AI's internal bearer.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
        - $ref: "#/components/parameters/XXLPodPlanOnly"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat completion (possibly after multiple internal tool turns).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403":
          description: Missing scope, or consent denied for a tool call.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "412":
          description: Provider not configured (no API key in keychain).
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "502":
          description: Upstream provider returned an error.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}

  /ai/session:
    post:
      operationId: postAiSession
      tags: [ai]
      summary: Open a logical AI session.
      description: |
        Creates a session that ties chat history, tool intersection,
        and audit lineage together. The session's internal bearer is
        the intersection of the calling user token's scopes and the
        AI tools the user has chosen to expose, computed once at
        session open and immutable thereafter — the model cannot
        escalate during the session.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  enum: [anthropic]
                model:
                  type: string
                  examples: ["claude-opus-4-6"]
      responses:
        "200":
          description: Session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403":
          description: Token lacks `ai:provider:call`.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}

  /ai/session/{id}/history:
    get:
      operationId: getAiSessionHistory
      tags: [ai]
      summary: Full transcript of an AI session.
      description: |
        Returns the message list, tool_use blocks, and tool_result
        blocks for a session. This is the canonical shape of the
        `ai-history.json` payload that Phase 10 will serialize into
        the workbook custom XML part.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Session transcript.
          content:
            application/json:
              schema:
                type: object
                required: [session_id, messages]
                properties:
                  session_id: {type: string, format: uuid}
                  messages:
                    type: array
                    items: {$ref: "#/components/schemas/ChatMessage"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "404":
          description: Session not found or expired.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}

  /ai/providers:
    get:
      operationId: getAiProviders
      tags: [ai]
      summary: List configured AI providers.
      description: |
        Returns each known provider with a *boolean* indicating
        whether a key is present in the OS keychain. The actual key
        is never echoed.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      responses:
        "200":
          description: Provider configuration status.
          content:
            application/json:
              schema:
                type: object
                required: [providers]
                properties:
                  providers:
                    type: array
                    items: {$ref: "#/components/schemas/Provider"}
        "401": {$ref: "#/components/responses/Unauthorized"}

  /ai/providers/key:
    post:
      operationId: postAiProviderKey
      tags: [ai]
      summary: Store or replace an AI provider API key.
      description: |
        Writes the supplied key into the OS keychain
        (`xlpod/{provider}_api_key`). Always opens a consent dialog
        before writing — the user must explicitly approve granting
        xlpod access to a paid AI account. The key is never echoed
        on success or written to the audit log.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, key]
              properties:
                provider: {type: string, enum: [anthropic]}
                key:
                  type: string
                  format: password
                  description: |
                    SENSITIVE. Sent only on this single request,
                    stored in the OS keychain, never echoed.
      responses:
        "200":
          description: Key stored.
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403":
          description: Consent denied.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
    delete:
      operationId: deleteAiProviderKey
      tags: [ai]
      summary: Erase an AI provider API key from the keychain.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
        - name: provider
          in: query
          required: true
          schema: {type: string, enum: [anthropic]}
      responses:
        "200":
          description: Key erased (or already absent).
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403":
          description: Consent denied.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}

  /ai/cost/today:
    get:
      operationId: getAiCostToday
      tags: [ai]
      summary: Today's AI usage rollup.
      description: |
        Returns the per-provider+model token + cost rollup for today
        (UTC). Cost is reported as integer micro-USD to avoid float
        drift; clients divide by 1_000_000 for dollars. The rollup
        is loaded at launcher start by replaying today's lines from
        the cost ledger (`%LOCALAPPDATA%/xlpod/cost.jsonl`); each AI
        call appends one line.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      responses:
        "200":
          description: Today's rollup.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostRollup"
        "401": {$ref: "#/components/responses/Unauthorized"}

  /ai/consent/window:
    post:
      operationId: postAiConsentWindow
      tags: [ai]
      summary: Open a "trust this AI for N minutes" window.
      description: |
        Phase 8 prompts on every mutating tool call, which is safe
        but noisy for a multi-step session. A trust window opens a
        single consent dialog up front asking the user to approve a
        named tool set for a bounded time; once approved, dispatch
        skips the per-call dialog for those tools (audit still
        records every call). The window auto-revokes on session
        close, on token expiry, and on any `ai_provider_upstream`
        5xx (defense against hijacked sessions).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrustWindowRequest"
      responses:
        "200":
          description: Window opened.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustWindow"
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403":
          description: User denied consent.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}

  /ai/tools:
    get:
      operationId: getAiTools
      tags: [ai]
      summary: List the AI tool registry.
      description: |
        Returns every tool the launcher will expose to a model,
        including its JSON Schema and the underlying xlpod route.
        This is the same registry the launcher passes to providers,
        derived at compile time from the existing route handlers via
        `schemars`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      responses:
        "200":
          description: Tool registry.
          content:
            application/json:
              schema:
                type: object
                required: [tools]
                properties:
                  tools:
                    type: array
                    items: {$ref: "#/components/schemas/ToolSpec"}
        "401": {$ref: "#/components/responses/Unauthorized"}

  /launcher/version:
    get:
      operationId: getLauncherVersion
      tags: [meta]
      summary: Launcher and proto version (authenticated).
      description: |
        Returns the launcher binary version and the proto version. Requires
        a bearer token but no scopes — useful for clients to detect upgrade
        mismatches before issuing scoped calls.
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      responses:
        "200":
          description: Version info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
        "401": {$ref: "#/components/responses/Unauthorized"}

  /ws:
    get:
      operationId: getWebSocket
      tags: [ws]
      summary: WebSocket upgrade — bidirectional event channel.
      description: |
        Upgrades the connection to a WebSocket. Phase 1 implements ping/pong
        only; the message schema is intentionally undefined here and will be
        added in Phase 1.2 alongside the launcher implementation.

        WSS is mandatory (the same TLS context as the REST routes). Plain
        `ws://` is forbidden. CSP `connect-src` measured in Phase 0 includes
        `wss:`, so this works from xlwings Lite.
      parameters:
        - $ref: "#/components/parameters/XXLPodProto"
      responses:
        "101":
          description: Switching Protocols → WebSocket.
        "401": {$ref: "#/components/responses/Unauthorized"}

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-256bit
      description: |
        256-bit random token, generated from the OS CSPRNG at every launcher
        start. Required on every route except `/health`. Tokens are scoped
        (see `Scope`) and rate-limited (100 req/s/token).

  parameters:

    XXLPodProto:
      name: X-XLPod-Proto
      in: header
      required: true
      description: |
        Proto version this client expects. The launcher rejects any value
        other than the version it was built against. Bump = breaking change.
      schema:
        type: string
        enum: ["1"]

    XXLPodPlanOnly:
      name: X-XLPod-Plan-Only
      in: header
      required: false
      description: |
        Reserved for future AI / dry-run integration (Phase 6+). When set to
        "1" on a mutation route, the launcher MUST NOT mutate state and
        SHOULD return a description of what *would* happen. Phase 1 ignores
        this header — but every mutation route added in Phase 1.x onwards
        will preserve the slot for forward compatibility.
      schema:
        type: string
        enum: ["0", "1"]
        default: "0"

  responses:

    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema: {$ref: "#/components/schemas/Error"}

  schemas:

    Scope:
      type: string
      description: |
        Capability scope attached to a bearer token. Tokens carry the
        minimum set the user has consented to; broadening a scope requires
        a new handshake and a new tray confirmation.
      enum:
        - "fs:read"
        - "fs:write"
        - "run:python"
        - "excel:com"
        - "ai:provider:call"
        - "ai:codegen:write"
        - "ai:exec:python"
      x-xlpod-scope-meta:
        "fs:read":          {phase: 1, status: active,   description: "Read files under user-approved roots."}
        "fs:write":         {phase: 1, status: active,   description: "Write files under user-approved roots."}
        "run:python":       {phase: 1, status: active,   description: "Execute Python in the launcher worker."}
        "excel:com":        {phase: 1, status: active,   description: "Drive Excel via COM (Windows)."}
        "ai:provider:call": {phase: 6, status: reserved, description: "Call an AI provider via the launcher (key never leaves launcher)."}
        "ai:codegen:write": {phase: 6, status: reserved, description: "Allow AI-driven code edits in user files (subject to dry-run + consent)."}
        "ai:exec:python":   {phase: 6, status: reserved, description: "Allow AI-issued run:python calls (logged with actor=ai:*)."}

    Health:
      type: object
      required: [status, launcher, proto]
      properties:
        status:
          type: string
          enum: ["ok"]
        launcher:
          type: string
          description: Launcher binary semver.
          examples: ["0.0.0"]
        proto:
          type: integer
          description: Proto version (matches X-XLPod-Proto).
          examples: [1]

    Version:
      type: object
      required: [launcher, proto]
      properties:
        launcher:
          type: string
        proto:
          type: integer

    HandshakeRequest:
      type: object
      required: [requested_scopes]
      properties:
        requested_scopes:
          type: array
          items: {$ref: "#/components/schemas/Scope"}
          description: |
            Scopes the client wants. The launcher MAY return a subset.
            Reserved scopes (`ai:*`) are rejected in Phase 1.
        fs_roots:
          type: array
          items: {type: string}
          description: |
            Absolute filesystem paths the token is allowed to read from
            (and, in a future phase, write to). REQUIRED when
            `requested_scopes` contains any `fs:*` scope; an empty list
            with `fs:read` requested is rejected with `bad_request`.
            Each entry is canonicalized server-side; the issued token
            stores the canonicalized form. Phase 4 will gate this
            through a tray consent dialog before issuing the token.

    Handshake:
      type: object
      required: [token, granted_scopes, expires_in]
      properties:
        token:
          type: string
          format: password
          description: |
            Bearer token. SENSITIVE — never log, never persist, never display
            in plain UI. The launcher's tracing layer redacts this value.
        granted_scopes:
          type: array
          items: {$ref: "#/components/schemas/Scope"}
        granted_fs_roots:
          type: array
          items: {type: string}
          description: |
            Canonicalized fs roots actually attached to this token. May
            be a subset of the requested set if the user denied any.
        expires_in:
          type: integer
          description: Seconds until the token expires.
          examples: [3600]

    RunPythonRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: |
            Python source. The worker `exec`s it inside a fresh local
            namespace; if the snippet sets a `_result` global, the
            value's `repr()` is returned in the `result` field.

    RunPythonResponse:
      type: object
      required: [ok, stdout, stderr]
      properties:
        ok:
          type: boolean
          description: True iff the snippet ran without raising. False on Python-level exceptions; the HTTP status is still 200.
        stdout:
          type: string
        stderr:
          type: string
        result:
          type: [string, "null"]
          description: repr() of `_result` if set, else null.
        error:
          type: [string, "null"]
          description: Python traceback when `ok=false`.

    Workbook:
      type: object
      required: [name, full_name]
      properties:
        name:
          type: string
        path:
          type: string
          description: Directory the workbook lives in (`""` for unsaved).
        full_name:
          type: string

    WorkbookList:
      type: object
      required: [workbooks]
      properties:
        workbooks:
          type: array
          items: {$ref: "#/components/schemas/Workbook"}

    RangeReadRequest:
      type: object
      required: [workbook, sheet, range]
      properties:
        workbook:
          type: string
        sheet:
          type: string
        range:
          type: string

    RangeData:
      type: object
      required: [address, values]
      properties:
        address:
          type: string
          description: Excel-canonical address of the resolved range.
        values:
          type: array
          description: 2-D array of cell values; single cells come back as [[value]].
          items:
            type: array
            items: {}

    FileContent:
      type: object
      required: [path, size, encoding, content]
      properties:
        path:
          type: string
          description: Canonical path the launcher actually read.
        size:
          type: integer
          description: Number of bytes in the file.
        encoding:
          type: string
          enum: ["base64"]
          description: |
            Always `base64` in Phase 3. A `utf-8` shortcut may be added
            later for plaintext files; clients MUST inspect the field.
        content:
          type: string
          description: Base64-encoded file bytes (no line wrapping).

    # ---- AI bridge (Phase 8) ---------------------------------------------

    Provider:
      type: object
      required: [name, has_key]
      properties:
        name:
          type: string
          enum: [anthropic]
        has_key:
          type: boolean
          description: Whether the OS keychain currently holds a key for this provider. The actual key is never echoed.

    Session:
      type: object
      required: [session_id, provider, model, granted_scopes, opened_ms]
      properties:
        session_id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [anthropic]
        model:
          type: string
          examples: ["claude-opus-4-6"]
        granted_scopes:
          type: array
          description: |
            Scopes the AI's *internal bearer* carries — the
            intersection of the calling user token's scopes and the
            tools the user has chosen to expose. Frozen at session
            open; the model cannot escalate.
          items: {$ref: "#/components/schemas/Scope"}
        opened_ms:
          type: integer
          description: Unix epoch milliseconds when the session was opened.

    TextBlock:
      type: object
      required: [type, text]
      properties:
        type: {type: string, enum: [text]}
        text: {type: string}

    ToolUseBlock:
      type: object
      required: [type, id, name, input]
      properties:
        type: {type: string, enum: [tool_use]}
        id: {type: string}
        name:
          type: string
          description: Tool name from the launcher's tool registry.
          examples: [fs_read, excel_workbooks, run_python]
        input:
          type: object
          description: JSON arguments matching the tool's input_schema.

    ToolResultBlock:
      type: object
      required: [type, tool_use_id, output]
      properties:
        type: {type: string, enum: [tool_result]}
        tool_use_id: {type: string}
        ok: {type: boolean}
        output:
          description: |
            JSON return value from the tool's underlying route, or
            an error envelope if the tool itself returned a 4xx/5xx.
        approved_via:
          type: string
          enum: [auto, dialog, trust_window]
          description: How the consent gate decided. Phase 8 ships only `auto` and `dialog`.

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        ts_ms:
          type: integer
        content:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/TextBlock"
              - $ref: "#/components/schemas/ToolUseBlock"
              - $ref: "#/components/schemas/ToolResultBlock"

    ToolSpec:
      type: object
      required: [name, description, input_schema, xlpod_route, required_scope, mutates]
      properties:
        name: {type: string}
        description: {type: string}
        input_schema:
          type: object
          description: JSON Schema fed to the provider, derived from the route's request struct.
        xlpod_route:
          type: string
          examples: ["GET /fs/read", "POST /run/python"]
        required_scope:
          $ref: "#/components/schemas/Scope"
        mutates:
          type: boolean
          description: True iff the tool can change state. Mutating tools always traverse the consent gate.

    Usage:
      type: object
      required: [input_tokens, output_tokens]
      properties:
        input_tokens: {type: integer}
        output_tokens: {type: integer}
        cached_input_tokens: {type: integer}

    ChatRequest:
      type: object
      required: [session_id, messages]
      properties:
        session_id:
          type: string
          format: uuid
        messages:
          type: array
          items: {$ref: "#/components/schemas/ChatMessage"}
        max_tokens:
          type: integer
          description: Provider-specific cap. Defaults to a small value to keep cost predictable.
        plan_only:
          type: boolean
          default: false
          description: Mirrors `X-XLPod-Plan-Only`. When true, mutating tools return a structured diff instead of executing.

    ChatResponse:
      type: object
      required: [session_id, message, stop_reason]
      properties:
        session_id: {type: string, format: uuid}
        message:
          $ref: "#/components/schemas/ChatMessage"
        stop_reason:
          type: string
          enum: [end_turn, max_tokens, tool_use_round_limit]
        usage:
          $ref: "#/components/schemas/Usage"
        cost_usd_micros:
          type: integer
          description: Cost of this exchange in micro-USD (Phase 9).

    CostEntry:
      type: object
      required: [provider, model, input_tokens, output_tokens, usd_micros]
      properties:
        provider: {type: string}
        model: {type: string}
        input_tokens: {type: integer}
        output_tokens: {type: integer}
        usd_micros:
          type: integer
          description: Integer micro-USD; divide by 1_000_000 for dollars.

    CostRollup:
      type: object
      required: [date, total_usd_micros, by_model]
      properties:
        date:
          type: string
          description: ISO 8601 date the rollup covers.
        total_usd_micros:
          type: integer
        by_model:
          type: array
          items: {$ref: "#/components/schemas/CostEntry"}

    TrustWindowRequest:
      type: object
      required: [session_id, tools, duration_secs]
      properties:
        session_id: {type: string, format: uuid}
        tools:
          type: array
          items: {type: string}
          description: Tool names that this window covers.
          examples: [["excel_range_read", "run_python"]]
        duration_secs:
          type: integer
          description: How long the window stays open (max 3600 in Phase 9).

    TrustWindow:
      type: object
      required: [id, session_id, tools, expires_ms]
      properties:
        id: {type: string, format: uuid}
        session_id: {type: string, format: uuid}
        tools:
          type: array
          items: {type: string}
        expires_ms:
          type: integer
          description: Unix epoch milliseconds when the window expires.

    # ---- shared error ----------------------------------------------------

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable code.
          examples:
            - "origin_not_allowed"
            - "scope_denied"
            - "rate_limited"
            - "consent_denied"
            - "forbidden_path"
            - "path_too_large"
            - "not_a_file"
            - "path_not_found"
            - "worker_spawn_failed"
            - "worker_timeout"
            - "worker_crashed"
            - "excel_not_available"
            - "excel_not_running"
            - "excel_failed"
            - "ai_provider_unconfigured"
            - "ai_provider_upstream"
            - "ai_tool_denied"
            - "ai_consent_denied"
            - "ai_plan_only_violation"
            - "ai_session_not_found"
            - "ai_trust_window_expired"
            - "ai_budget_exceeded"
        message:
          type: string
          description: Human-readable message (not localized in v0).
        hint:
          type: string
          description: Optional remediation hint.
